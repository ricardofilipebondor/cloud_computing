services:
  homework1:
    build:
      context: ../homework_1
      dockerfile: Dockerfile
    container_name: corpsync-homework1
    ports:
      - "3000:3000"
    volumes:
      - homework1_data:/app/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: corpsync-backend
    depends_on:
      - homework1
    env_file:
      - ./backend/.env
    environment:
      HOMEWORK_DB_BASE_URL: http://homework1:3000
      PORT: 4000
    ports:
      - "4000:4000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_BACKEND_URL: http://localhost:4000
    container_name: corpsync-frontend
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_BACKEND_URL: http://localhost:4000
    ports:
      - "3001:3001"
    restart: unless-stopped

volumes:
  homework1_data:
